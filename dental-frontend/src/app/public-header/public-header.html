<header class="luxury-header" [class.mobile-open]="mobileMenuOpen">
  <div class="nav-wrapper">
    <div class="brand-section" (click)="scrollToSection('home')">
      <img src="logo.png" alt="Code Smiles Logo" class="main-logo" />
      <div class="logo-text">
        <span class="main-name">CODE SMILES</span>
      </div>
    </div>

    <nav class="nav-links" [class.nav-open]="mobileMenuOpen">
      <a (click)="scrollToSection('home')">HOME</a>
      <a (click)="scrollToSection('services')">SERVICES</a>
      <a (click)="scrollToSection('about')">ABOUT US</a>
      <a (click)="scrollToSection('contact')">CONTACT</a>
      <!-- Mobile-only action buttons inside the nav drawer -->
      <div class="mobile-nav-actions">
        <a routerLink="/login" class="header-login-link" (click)="closeMobileMenu()">LOGIN</a>
        <button class="book-btn" (click)="handleBook()">BOOK APPOINTMENT</button>
      </div>
    </nav>

    <div class="action-buttons">
      <a routerLink="/login" class="header-login-link">LOGIN</a>
      <button class="book-btn" (click)="handleBook()">BOOK APPOINTMENT</button>
    </div>

    <!-- Hamburger button (mobile only) -->
    <button class="hamburger-btn" (click)="toggleMobileMenu()" [attr.aria-expanded]="mobileMenuOpen" aria-label="Toggle navigation">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Mobile overlay -->
  <div class="mobile-overlay" *ngIf="mobileMenuOpen" (click)="closeMobileMenu()"></div>
</header>
