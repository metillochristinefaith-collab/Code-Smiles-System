<!-- Mobile top bar (visible only on small screens) -->
<div class="sidebar-mobile-bar">
  <button class="sidebar-hamburger" (click)="openSidebar()" aria-label="Open navigation">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-mobile-brand">
    <img src="logo.png" alt="Code Smiles" />
    <span>Patient Concierge</span>
  </div>
  <div style="width:40px"></div>
</div>

<!-- Overlay backdrop -->
<div class="sidebar-overlay" [class.overlay-visible]="sidebarOpen" (click)="closeSidebar()"></div>

<aside class="patient-sidebar-shell" [class.sidebar-open]="sidebarOpen">
  <div class="sidebar-inner">
    <div class="brand-block">
      <div class="brand-mark">
        <img src="logo.png" alt="Code Smiles logo" class="brand-logo" />
      </div>

      <div class="brand-copy">
        <span class="eyebrow">Code Smiles</span>
        <h2>Patient Concierge</h2>
      </div>
    </div>

    <section class="sidebar-panel sidebar-panel-navigation">
      <span class="sidebar-panel-label">Navigation</span>

      <nav class="sidebar-nav">
        <a
          class="nav-item"
          routerLink="/patient-dashboard"
          [class.active]="isDashboardActive()"
          (click)="closeSidebar()"
          title="Dashboard">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="4.5" y="4.5" width="6" height="6" rx="1.2" />
              <rect x="13.5" y="4.5" width="6" height="6" rx="1.2" />
              <rect x="4.5" y="13.5" width="6" height="6" rx="1.2" />
              <rect x="13.5" y="13.5" width="6" height="6" rx="1.2" />
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>

        <a
          class="nav-item"
          routerLink="/patient-appointments"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebar()"
          title="My Appointments">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="5.5" width="16" height="14.5" rx="2.2" />
              <path d="M8 3.5v4M16 3.5v4M4 9.5h16" />
            </svg>
          </span>
          <span class="nav-label">My Appointments</span>
        </a>

        <a
          class="nav-item"
          routerLink="/patient-medical-vault"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebar()"
          title="Medical Vault">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 3.5h6l4 4V20a1.5 1.5 0 0 1-1.5 1.5h-8A2.5 2.5 0 0 1 6 19V6a2.5 2.5 0 0 1 2-2.5Z" />
              <path d="M14 3.5v5h5M9 12h6M9 16h4" />
            </svg>
          </span>
          <span class="nav-label">Medical Vault</span>
        </a>

        <a
          class="nav-item"
          routerLink="/patient-treatment-progress"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [class.active]="isTreatmentProgressActive()"
          (click)="closeSidebar()"
          title="Treatment Progress">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 18.5h3l2.3-6 4 3 2.3-7L20 12.5" />
            </svg>
          </span>
          <span class="nav-label">Treatment Progress</span>
        </a>

        <a
          class="nav-item"
          routerLink="/patient-profile"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebar()"
          title="Profile">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 12a3.5 3.5 0 1 0-3.5-3.5A3.5 3.5 0 0 0 12 12Z" />
              <path d="M5.5 19.5a6.8 6.8 0 0 1 13 0" />
            </svg>
          </span>
          <span class="nav-label">Profile</span>
        </a>

        <a
          class="nav-item"
          routerLink="/patient-notifications"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebar()"
          title="Notifications">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6.5 16.5h11l-1.5-2.2V10a4 4 0 1 0-8 0v4.3Z" />
              <path d="M10 18.5a2 2 0 0 0 4 0" />
            </svg>
          </span>
          <span class="nav-label">Notifications</span>
        </a>

        <button
          class="nav-item nav-item-toggle"
          type="button"
          [class.active]="isClinicSectionActive()"
          [attr.aria-expanded]="clinicExpanded"
          (click)="toggleClinicSection()"
          title="Clinic">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5.5 19.5V8.5l6.5-4 6.5 4v11" />
              <path d="M8.5 19.5v-4h7v4" />
            </svg>
          </span>
          <span class="nav-label">Clinic</span>
          <span class="nav-caret" aria-hidden="true"></span>
        </button>

        <div class="clinic-subnav" [class.clinic-subnav-open]="clinicExpanded">
          <a
            class="subnav-item"
            routerLink="/patient-services"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
            title="Services">
            <span class="subnav-bullet" aria-hidden="true"></span>
            <span class="nav-label">Services</span>
          </a>

          <a
            class="subnav-item"
            routerLink="/patient-about"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
            title="About Clinic">
            <span class="subnav-bullet" aria-hidden="true"></span>
            <span class="nav-label">About Clinic</span>
          </a>

          <a
            class="subnav-item"
            routerLink="/patient-contact"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
            title="Contact">
            <span class="subnav-bullet" aria-hidden="true"></span>
            <span class="nav-label">Contact</span>
          </a>
        </div>
      </nav>
    </section>

    <div class="sidebar-cta-wrap">
      <a class="sidebar-book-btn" routerLink="/patient-booking" (click)="closeSidebar()">
        <span class="nav-icon sidebar-btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M11 5h2v14h-2z" />
            <path d="M5 11h14v2H5z" />
          </svg>
        </span>
        <span class="sidebar-book-label">Book Appointment</span>
      </a>
    </div>

    <section class="sidebar-panel sidebar-panel-support">
      <span class="sidebar-panel-label">Support</span>

      <nav class="sidebar-nav">
        <a
          class="nav-item nav-item-muted"
          routerLink="/patient-help-center"
          (click)="closeSidebar()"
          title="Help Center">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="7.5" />
              <path d="M9.7 9.6a2.5 2.5 0 1 1 4.2 1.8c-.8.7-1.4 1.2-1.4 2.3M12 16.9h.01" />
            </svg>
          </span>
          <span class="nav-label">Help Center</span>
        </a>

        <button
          class="nav-item nav-item-muted logout-item"
          type="button"
          (click)="logout()"
          title="Log Out">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M10 6H6.5A1.5 1.5 0 0 0 5 7.5v9A1.5 1.5 0 0 0 6.5 18H10" />
              <path d="M13 8.5 17 12l-4 3.5M9 12h8" />
            </svg>
          </span>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </section>

    <footer class="sidebar-footer sidebar-legal">
      <a
        class="legal-link"
        routerLink="/patient-help-center"
        [queryParams]="{}"
        fragment="privacy"
        title="Privacy Policy">
        privacy policy
      </a>
      <span class="legal-divider" aria-hidden="true">&middot;</span>
      <a
        class="legal-link"
        routerLink="/patient-help-center"
        [queryParams]="{}"
        fragment="terms"
        title="Terms">
        terms
      </a>
    </footer>
  </div>
</aside>
