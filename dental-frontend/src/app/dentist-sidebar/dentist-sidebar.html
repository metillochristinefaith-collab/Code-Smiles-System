<!-- Mobile top bar -->
<div class="sidebar-mobile-bar">
  <button class="sidebar-hamburger" (click)="openSidebar()" aria-label="Open navigation">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-mobile-brand">
    <img src="logo.png" alt="Code Smiles" />
    <span>Dentist Portal</span>
  </div>
  <div style="width:40px"></div>
</div>

<!-- Overlay backdrop -->
<div class="sidebar-overlay" [class.overlay-visible]="sidebarOpen" (click)="closeSidebar()"></div>

<aside class="dentist-sidebar" [class.sidebar-open]="sidebarOpen">
  <div class="dentist-sidebar-shell">

    <div class="dentist-brand">
      <div class="dentist-brand-mark">
        <img src="logo.png" alt="Code Smiles logo" class="dentist-brand-logo" />
      </div>
      <div class="dentist-brand-copy">
        <span class="dentist-eyebrow">Code Smiles</span>
        <h1>Dentist Portal</h1>
      </div>
    </div>

    <section class="dentist-panel">
      <span class="dentist-panel-label">Main Menu</span>

      <nav class="dentist-sidebar-nav" aria-label="Dentist portal navigation">
        <a class="dentist-nav-link" routerLink="/dentist-dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="4.5" y="4.5" width="6" height="6" rx="1.2" />
              <rect x="13.5" y="4.5" width="6" height="6" rx="1.2" />
              <rect x="4.5" y="13.5" width="6" height="6" rx="1.2" />
              <rect x="13.5" y="13.5" width="6" height="6" rx="1.2" />
            </svg>
          </span>
          <span class="dentist-nav-label">Dashboard</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-appointments" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="5.5" width="16" height="14.5" rx="2.2" />
              <path d="M8 3.5v4M16 3.5v4M4 9.5h16" />
            </svg>
          </span>
          <span class="dentist-nav-label">My Appointments</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-calendar" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </span>
          <span class="dentist-nav-label">Calendar</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-patients" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M5.5 19.5a6.8 6.8 0 0 1 13 0" />
            </svg>
          </span>
          <span class="dentist-nav-label">My Patients</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-medical-vault" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 3.5h6l4 4V20a1.5 1.5 0 0 1-1.5 1.5h-8A2.5 2.5 0 0 1 6 19V6a2.5 2.5 0 0 1 2-2.5Z" />
              <path d="M14 3.5v5h5M9 12h6M9 16h4" />
            </svg>
          </span>
          <span class="dentist-nav-label">Medical Records</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-treatment-plans" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 18.5h3l2.3-6 4 3 2.3-7L20 12.5" />
            </svg>
          </span>
          <span class="dentist-nav-label">Treatment Plans</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-prescriptions" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 3.5h6a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2Z" />
              <path d="M7 6.5H5.5A1.5 1.5 0 0 0 4 8v11a1.5 1.5 0 0 0 1.5 1.5h13A1.5 1.5 0 0 0 20 19V8a1.5 1.5 0 0 0-1.5-1.5H17" />
              <path d="M9 13h6M9 17h4" />
            </svg>
          </span>
          <span class="dentist-nav-label">Prescriptions</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-notifications" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6.5 16.5h11l-1.5-2.2V10a4 4 0 1 0-8 0v4.3Z" />
              <path d="M10 18.5a2 2 0 0 0 4 0" />
            </svg>
          </span>
          <span class="dentist-nav-label">Notifications</span>
          <span class="dentist-nav-count">3</span>
        </a>
      </nav>
    </section>

    <section class="dentist-panel dentist-support-panel">
      <span class="dentist-panel-label">Account</span>

      <nav class="dentist-sidebar-nav" aria-label="Dentist account navigation">
        <a class="dentist-nav-link" routerLink="/dentist-profile" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M5.5 19.5a6.8 6.8 0 0 1 13 0" />
            </svg>
          </span>
          <span class="dentist-nav-label">Profile</span>
        </a>

        <a class="dentist-nav-link" routerLink="/dentist-help-center" routerLinkActive="active" (click)="closeSidebar()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="7.5" />
              <path d="M9.7 9.6a2.5 2.5 0 1 1 4.2 1.8c-.8.7-1.4 1.2-1.4 2.3M12 16.9h.01" />
            </svg>
          </span>
          <span class="dentist-nav-label">Help Center</span>
        </a>

        <button class="dentist-nav-link dentist-logout-link" type="button" (click)="logout()">
          <span class="dentist-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M10 6H6.5A1.5 1.5 0 0 0 5 7.5v9A1.5 1.5 0 0 0 6.5 18H10" />
              <path d="M13 8.5 17 12l-4 3.5M9 12h8" />
            </svg>
          </span>
          <span class="dentist-nav-label">Log Out</span>
        </button>
      </nav>
    </section>

    <footer class="dentist-footer">
      <a routerLink="/dentist-help-center" fragment="privacy-policy">privacy policy</a>
      <span>&middot;</span>
      <a routerLink="/dentist-help-center" fragment="terms-of-use">terms</a>
    </footer>

  </div>
</aside>
