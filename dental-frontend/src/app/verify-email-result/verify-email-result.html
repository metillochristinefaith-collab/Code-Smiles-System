<div class="result-page">
  <div class="page-bg" aria-hidden="true"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-stripe" [attr.data-icon]="icon"></div>

      <!-- Brand -->
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">&#129463;</div>
        <span>Code Smiles</span>
      </div>

      <!-- Status icon -->
      <div class="status-icon-wrap" [attr.data-icon]="icon" aria-hidden="true">
        <div class="status-icon-ring"></div>
        <div class="status-icon">

          <!-- Success checkmark -->
          <svg *ngIf="icon === 'success'" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2.5"/>
            <path d="M14 24l7 7 13-14" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Warning clock -->
          <svg *ngIf="icon === 'warning'" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2.5"/>
            <path d="M24 14v11l7 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Error X -->
          <svg *ngIf="icon === 'error'" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2.5"/>
            <path d="M16 16l16 16M32 16L16 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>

        </div>
      </div>

      <!-- Title & message -->
      <h1>{{ title }}</h1>
      <p class="message">{{ message }}</p>

      <div class="divider"></div>

      <!-- ── Success: just sign in ─────────────────────────────────────── -->
      <div class="actions" *ngIf="isSuccess">
        <button type="button" class="btn-primary" (click)="goToLogin()">
          Sign In to Your Account
        </button>
      </div>

      <!-- ── Expired / Invalid: inline resend panel ───────────────────── -->
      <div class="resend-panel" *ngIf="canResend">

        <!-- Success feedback after resend -->
        <div class="resend-success" *ngIf="resendMessage">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          {{ resendMessage }}
        </div>

        <!-- Error feedback -->
        <div class="resend-error" *ngIf="resendError">{{ resendError }}</div>

        <!-- Email input + send button -->
        <div class="resend-form" *ngIf="!resendMessage">
          <label for="resend-email" class="resend-label">Enter your email to get a new link</label>
          <div class="resend-input-row">
            <input
              id="resend-email"
              type="email"
              class="resend-input"
              [(ngModel)]="email"
              placeholder="your@email.com"
              autocomplete="email"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              [disabled]="isResending || cooldown > 0"
            />
            <button
              type="button"
              class="btn-resend"
              (click)="resend()"
              [disabled]="isResending || cooldown > 0 || !email.trim()">
              <span *ngIf="!isResending && cooldown === 0">Resend Email</span>
              <span *ngIf="isResending">Sending…</span>
              <span *ngIf="!isResending && cooldown > 0">Resend in {{ cooldown }}s</span>
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="actions actions-secondary">
          <button type="button" class="btn-secondary" (click)="goToLogin()">
            Back to Sign In
          </button>
        </div>
      </div>

      <!-- ── Generic error: just go back ─────────────────────────────── -->
      <div class="actions" *ngIf="!isSuccess && !canResend">
        <button type="button" class="btn-primary" (click)="goToLogin()">
          Back to Sign In
        </button>
      </div>

      <p class="help-note" *ngIf="isSuccess">
        Welcome to Code Smiles Dental Portal. Your account is now active.
      </p>
      <p class="help-note" *ngIf="!isSuccess">
        Need help? Contact us at
        <a href="mailto:hello@codesmiles.com">hello@codesmiles.com</a>
      </p>
    </div>
  </div>
</div>
